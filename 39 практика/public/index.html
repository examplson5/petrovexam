<!DOCTYPE html>
<html>
<head>
    <title>JWT Auth</title>
    <style>
        body { font-family: Arial; max-width: 500px; margin: 50px auto; padding: 20px; background: #f5f5f5; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 15px; }
        input { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ddd; border-radius: 4px; }
        button { width: 100%; padding: 10px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #0056b3; }
        .result { padding: 10px; border-radius: 4px; margin-top: 10px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .hidden { display: none; }
        .token-box { word-break: break-all; background: #f8f9fa; padding: 10px; border-radius: 4px; font-size: 12px; }
        .btn-danger { background: #dc3545; }
        .btn-danger:hover { background: #c82333; }
        .btn-success { background: #28a745; }
        .btn-success:hover { background: #218838; }
    </style>
</head>
<body>
    <h1>🔐 JWT Аутентификация</h1>

    <div class="card" id="registerCard">
        <h3>📝 Регистрация</h3>
        <input id="regUsername" placeholder="Логин">
        <input id="regPassword" placeholder="Пароль" type="password">
        <button onclick="register()">Зарегистрироваться</button>
        <div id="regResult" class="result hidden"></div>
    </div>

    <div class="card" id="loginCard">
        <h3>🔑 Вход</h3>
        <input id="loginUsername" placeholder="Логин">
        <input id="loginPassword" placeholder="Пароль" type="password">
        <button onclick="login()">Войти</button>
        <div id="loginResult" class="result hidden"></div>
        <div id="tokenDisplay" class="hidden" style="margin-top:10px;">
            <strong>Токен:</strong>
            <div class="token-box" id="tokenValue"></div>
            <button class="btn-success" onclick="copyToken()">📋 Копировать</button>
        </div>
    </div>

    <div class="card" id="protectedCard">
        <h3>🔒 Защищённые маршруты</h3>
        <button onclick="getProfile()">👤 Профиль</button>
        <button onclick="getProtected()">🛡️ Защищённый</button>
        <div id="protectedResult" class="result hidden"></div>
    </div>

    <script>
        let token = '';

        async function register() {
            const username = document.getElementById('regUsername').value;
            const password = document.getElementById('regPassword').value;
            const result = document.getElementById('regResult');

            const res = await fetch('/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const data = await res.json();
            result.className = `result ${res.ok ? 'success' : 'error'}`;
            result.textContent = data.message || data.error;
            result.classList.remove('hidden');
        }

        async function login() {
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;
            const result = document.getElementById('loginResult');

            const res = await fetch('/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const data = await res.json();
            result.className = `result ${res.ok ? 'success' : 'error'}`;
            result.textContent = res.ok ? '✅ Вход выполнен' : data.error;
            result.classList.remove('hidden');

            if (res.ok) {
                token = data.token;
                document.getElementById('tokenDisplay').classList.remove('hidden');
                document.getElementById('tokenValue').textContent = token;
            }
        }

        async function getProfile() {
            const result = document.getElementById('protectedResult');
            const res = await fetch('/profile', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await res.json();
            result.className = `result ${res.ok ? 'success' : 'error'}`;
            result.textContent = res.ok ? JSON.stringify(data, null, 2) : data.error;
            result.classList.remove('hidden');
        }

        async function getProtected() {
            const result = document.getElementById('protectedResult');
            const res = await fetch('/protected', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await res.json();
            result.className = `result ${res.ok ? 'success' : 'error'}`;
            result.textContent = res.ok ? data.message : data.error;
            result.classList.remove('hidden');
        }

        function copyToken() {
            navigator.clipboard.writeText(token);
            alert('Токен скопирован');
        }
    </script>
</body>
</html>

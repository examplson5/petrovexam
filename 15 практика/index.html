<!DOCTYPE html>
<html>
<head>
    <title>Яндекс Карты</title>
    <script src="https://api-maps.yandex.ru/2.1/?apikey=ВАШ_API_КЛЮЧ&lang=ru_RU"></script>
    <style>
        #map { width: 100%; height: 500px; }
    </style>
</head>
<body>
    <h2>📍 Интерактивная карта</h2>
    <div id="map"></div>
    <button onclick="addMarker()">Добавить маркер</button>

    <script>
        let myMap;
        ymaps.ready(function() {
            myMap = new ymaps.Map('map', {
                center: [55.76, 37.64],
                zoom: 10
            });
        });

        function addMarker() {
            const coords = [55.76 + Math.random() * 0.1, 37.64 + Math.random() * 0.1];
            const placemark = new ymaps.Placemark(coords, {
                balloonContent: `Маркер в [${coords[0].toFixed(4)}, ${coords[1].toFixed(4)}]`
            });
            myMap.geoObjects.add(placemark);
        }
    </script>
</body>
</html>

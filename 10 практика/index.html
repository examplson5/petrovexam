<!DOCTYPE html>
<html>
<head>
    <title>Загрузка изображений</title>
    <style>
        body { font-family: Arial; max-width: 800px; margin: 50px auto; padding: 20px; }
        .upload-area { border: 2px dashed #ccc; padding: 40px; text-align: center; cursor: pointer; border-radius: 8px; }
        .upload-area.dragover { background: #f0f0f0; border-color: #007bff; }
        #gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; margin-top: 20px; }
        #gallery img { width: 100%; height: 150px; object-fit: cover; border-radius: 8px; border: 1px solid #ddd; }
        .preview-container { position: relative; }
        .delete-btn { position: absolute; top: 5px; right: 5px; background: red; color: white; border: none; border-radius: 50%; width: 25px; height: 25px; cursor: pointer; }
        input[type="file"] { display: none; }
    </style>
</head>
<body>
    <h2>📸 Загрузка изображений</h2>
    
    <div class="upload-area" id="dropZone">
        <p>Перетащите изображения сюда или нажмите для выбора</p>
        <input type="file" id="fileInput" multiple accept="image/*">
    </div>
    
    <div id="gallery"></div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const gallery = document.getElementById('gallery');

        // Клик для выбора файлов
        dropZone.addEventListener('click', () => fileInput.click());

        // Выбор файлов
        fileInput.addEventListener('change', (e) => {
            handleFiles(e.target.files);
            fileInput.value = '';
        });

        // Drag and Drop
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            handleFiles(e.dataTransfer.files);
        });

        // Обработка файлов
        function handleFiles(files) {
            Array.from(files).forEach(file => {
                if (!file.type.startsWith('image/')) return;
                
                const reader = new FileReader();
                reader.onload = (e) => {
                    const container = document.createElement('div');
                    container.className = 'preview-container';
                    
                    const img = document.createElement('img');
                    img.src = e.target.result;
                    
                    const btn = document.createElement('button');
                    btn.className = 'delete-btn';
                    btn.textContent = '×';
                    btn.onclick = () => container.remove();
                    
                    container.appendChild(img);
                    container.appendChild(btn);
                    gallery.appendChild(container);
                };
                reader.readAsDataURL(file);
            });
        }
    </script>
</body>
</html>
